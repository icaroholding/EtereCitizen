app = "eterecitizen-api"
primary_region = "fra"

[build]
  dockerfile = "packages/api/Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  BASE_SEPOLIA_RPC_URL = "https://sepolia.base.org"
  BASE_MAINNET_RPC_URL = "https://mainnet.base.org"
  CITIZEN_REPUTATION_ADDRESS = "0x6d51FeBF4E8e87388BDCc90E85ce0c2fF6D19843"
  CORS_ORIGINS = "https://eterecitizen.io,https://www.eterecitizen.io"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/api/health"
  timeout = "5s"
