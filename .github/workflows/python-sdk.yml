name: Python SDK

on:
  pull_request:
    paths:
      - 'sdks/python/**'
      - 'spec/test-vectors/**'
      - '.github/workflows/python-sdk.yml'
  push:
    branches: [main]
    paths:
      - 'sdks/python/**'
      - 'spec/test-vectors/**'
      - '.github/workflows/python-sdk.yml'

concurrency:
  group: python-sdk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install eterecitizen with test extras
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[test]'

      - name: Run pytest
        working-directory: sdks/python
        run: pytest -v

      - name: Run conformance script (sanity)
        working-directory: sdks/python
        run: python scripts/run_conformance.py
