version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_RPC_URL=https://mainnet.base.org
      - ETERECITIZEN_CONTRACT_ADDRESS=0x2BecDFe8406eA2895F16a9B8448b40166F4178f6
      - PINATA_API_KEY=${PINATA_API_KEY}
      - PINATA_SECRET_KEY=${PINATA_SECRET_KEY}
    restart: unless-stopped
